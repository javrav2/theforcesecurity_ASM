[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aegis-praetorium"
version = "0.1.0"
description = "Aegis Vanguard's deterministic guard layer (Lictor / Censor / Augur) shared across the platform agent and the NanoClaw agent"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[tool.hatch.build.targets.wheel]
packages = ["aegis_praetorium"]

[tool.hatch.build.targets.sdist]
include = ["aegis_praetorium"]
